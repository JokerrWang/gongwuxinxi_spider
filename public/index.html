<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f6f7f2">
    <title>天津公职/国企招聘信息汇总</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="top-panel">
        <div>
          <p class="eyebrow">天津 · 公职 / 国企招聘</p>
          <h1>天津公职/国企招聘信息汇总</h1>
          <p class="subline" id="updatedText">最近一次更新时间为：正在连接官方信息源</p>
        </div>
        <button class="icon-button" id="refreshButton" aria-label="刷新">
          <span aria-hidden="true">↻</span>
        </button>
      </section>

      <section class="notice-area">
        <div class="section-title">
          <h2>最新动态</h2>
          <span id="resultCount"></span>
        </div>
        <div class="info-tabs" role="tablist" aria-label="信息类型">
          <button class="info-tab active" data-tab="civil" type="button">公职信息</button>
          <button class="info-tab" data-tab="enterprise" type="button">国企信息</button>
        </div>
        <div class="notice-list" id="noticeList">
          <article class="skeleton"></article>
          <article class="skeleton"></article>
          <article class="skeleton"></article>
        </div>
        <div class="pagination" id="pagination" aria-label="最新动态分页"></div>
      </section>

      <section class="source-panel">
        <h2>官方来源</h2>
        <div id="sourceList"></div>
      </section>
    </main>

    <template id="noticeTemplate">
      <article class="notice-card">
        <div class="notice-head">
          <span class="pill"></span>
          <span class="date"></span>
        </div>
        <h3></h3>
        <div class="meta-row">
          <span class="status"></span>
          <span class="source"></span>
        </div>
        <a class="open-link" target="_blank" rel="noopener">查看原文</a>
      </article>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
